<!-- INSERT_YOUR_REWRITE_HERE -->
<div *ngIf="showPopUp === true" class="partpay-modal">
  <div class="comman">
    <div class="part-payment-container"
         style="max-width:500px; margin:0 auto; padding:2em; border-radius:8px; background:#f9fafe; border:1.5px solid #dde3fa; box-shadow:0 3px 16px rgba(65,85,170,0.10); position:relative;">

      <!-- Close Button -->
      <button
        type="button"
        class="close-btn"
        aria-label="Close"
        (click)="close()"
        style="position:absolute; top:10px; right:10px; font-size:1.8em; background:none; border:none;">
        &times;
      </button>

      <h2 style="margin-bottom:1.2em;">Part Payment</h2>

      <!-- Summary Bill -->
      <div style="margin-bottom:1em;">
        <label style="font-weight:500;">Total Bill Amount:</label>
        <span style="margin-left:1em; font-size:1.1em; font-weight:600;">
          ₹{{ itemtotalamount | number:'1.2-2' }}
        </span>
      </div>

      <!-- Part Payment Form -->
      <form #partPayForm="ngForm" (ngSubmit)="onPartPaySubmit()">
        <div style="display: flex; flex-direction: column; gap: 0.8em;">
          <!-- Payment Method 1 -->
          <div style="display:flex; align-items:center; gap:30px;">
            <div>
              <label style="font-weight:500;">Select 1st Payment Method:</label>
              <div style="margin-top:2px;">
                <ng-container *ngFor="let method of paybydata">
                  <label 
                        style="margin-right:14px; font-weight:400; display:inline-flex; align-items:center;">
                    <input
                      type="radio"
                      [checked]="!(partPay.payMode1 !== partPay.payMode2 || (partPay.payMode2 === method._id))"
                      name="payMode1"
                      [value]="method._id"
                      [(ngModel)]="partPay.payMode1"
                      required
                      style="accent-color:#4e6efa"
                    />
                    <span style="margin-left:4px;">{{ method.name }}</span>
                  </label>
                </ng-container>
              </div>
            </div>
            <div>
              <label for="payAmount1" style="font-weight:500;">Amount:</label>
              <input
                id="payAmount1"
                name="payAmount1"
                type="number"
                min="1"
                [max]="itemtotalamount"
                [(ngModel)]="partPay.amount1"
                required
                style="margin-left:7px; padding:5px 9px; border-radius:4px; border:1px solid #aacafd; min-width:80px;"
                placeholder="₹ Amount"
                inputmode="numeric"
                autocomplete="off"
              />
            </div>
          </div>
          <!-- Payment Method 2 -->
          <div style="display:flex; align-items:center; gap:30px;">
            <div>
              <label style="font-weight:500;">Select 2nd Payment Method:</label>
              <div style="margin-top:2px;">
                <ng-container *ngFor="let method of paybydata">
                  <label 
                        style="margin-right:14px; font-weight:400; display:inline-flex; align-items:center;">
                    <input
                      type="radio"
                      [checked]="!(partPay.payMode2 !== partPay.payMode1 || (partPay.payMode1 === method._id))"
                      name="payMode2"
                      [value]="method._id"
                      [(ngModel)]="partPay.payMode2"
                      style="accent-color:#4e6efa"
                    />
                    <span style="margin-left:4px;">{{ method.name }}</span>
                  </label>
                </ng-container>
              </div>
            </div>
            <div>
              <label for="payAmount2" style="font-weight:500;">Amount:</label>
              <input
                id="payAmount2"
                name="payAmount2"
                type="number"
                min="0"
                [max]="itemtotalamount"
                [(ngModel)]="partPay.amount2"
                style="margin-left:7px; padding:5px 9px; border-radius:4px; border:1px solid #aacafd; min-width:80px;"
                placeholder="₹ Amount"
                inputmode="numeric"
                autocomplete="off"
              />
            </div>
          </div>
        </div>

        <!-- Validation Messages -->
        <div *ngIf="((partPay?.amount1 || 0) + (partPay?.amount2 || 0)) > (itemtotalamount || 0)"
             style="color:#c40000; font-size:14px; margin-top:0.3em;">
          Amount exceeds total!
        </div>
        <div
          *ngIf="((partPay?.amount1 || 0) + (partPay?.amount2 || 0)) !== (itemtotalamount || 0)
                  && ((partPay?.amount1 || 0) > 0 || (partPay?.amount2 || 0) > 0)"
          style="color:#c40000; font-size:14px;">
          Payment total must match bill amount!
        </div>

        <!-- Remarks Field -->
        <div style="margin-top:1em;">
          <label for="remarks" style="font-weight:500;">Remarks:</label>
          <input
            id="remarks"
            name="remarks"
            type="text"
            [(ngModel)]="paymentRemark"
            placeholder="(Optional)"
            style="margin-left:10px; padding:6px 10px; border-radius:4px; border:1px solid #e0e1e6; min-width:170px;"
            autocomplete="off"
          />
        </div>

        <!-- Actions -->
        <div style="display:flex; gap:1.2em; margin-top:2em; justify-content:flex-end;">
          <button
            type="submit"
            [disabled]="
              !partPayForm.valid ||
              !partPay.payMode1 ||
              !partPay.amount1 ||
              !partPay.payMode2 ||
              partPay.payMode1 === partPay.payMode2 ||
              (partPay.amount1 + (partPay.amount2 || 0)) !== itemtotalamount
            "
            class="btn btn-primary"
            style="padding:8px 22px; border-radius:5px; background:#4287ff; color:#fff; border:none; font-weight:500;">
            Make Part Payment
          </button>
          <button
            type="button"
            class="btn btn-secondary"
            style="padding:8px 22px; border-radius:5px; background:#e5e7f5; color:#414161; border:none; font-weight:500;"
            (click)="close()">
            Cancel
          </button>
        </div>
      </form>

      <!-- Part Payments History -->
      <ng-container *ngIf="partPayments?.length">
        <div style="margin-top:2em;">
          <h4 style="margin-bottom:0.5em;">Part Payments Done</h4>
          <ul style="background:#f5f6fa; border-radius:5px; padding:1em; border:1px solid #e1e2ea; margin-bottom:0;">
            <li *ngFor="let p of partPayments"
                style="margin-bottom:5px; font-size:15px; display:flex; align-items:center; gap:6px;">
              <span>₹{{ p.amount | number:'1.2-2' }}</span>
              <span>via <strong>{{ p.mode }}</strong></span>
              <span *ngIf="p.remarks">&mdash; {{ p.remarks }}</span>
              <span style="color:#979aaf; font-size:11px; margin-left:auto;">[{{ p.date | date:'short' }}]</span>
            </li>
          </ul>
          <!-- Outstanding -->
          <div style="margin-top:0.8em;">
            <span style="font-weight:500;">
              Outstanding:
              <span [style.color]="remainingAmount === 0 ? '#19b325' : '#d40001'">
                ₹{{ remainingAmount | number:'1.2-2' }}
              </span>
            </span>
          </div>
        </div>
      </ng-container>
    </div>
  </div>
</div>
