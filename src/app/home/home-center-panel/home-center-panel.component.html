    <div class="billing-app max-w-5xl mx-auto py-8 px-3 sm:px-5" style="width: 100%;">
      <div class="flex items-center justify-between mb-2 px-1">
        <h5 class="text-base font-semibold text-cyan-800 tracking-tight mb-0">Menu Explorer</h5>
        <span class="text-cyan-600 text-xs font-medium ml-2">Delicious choices for every mood! 🍴</span>
      </div>
      <div *ngIf="productsByCategoryId" class="flex flex-wrap items-center justify-center gap-3 text-base mb-4 bg-gray-50 rounded-lg py-3 px-2 shadow-sm">
        <input
          type="text"
          [(ngModel)]="selectedType"
          placeholder="🔍 Search food..."
          (keyup)="getFilteredProductsByCategoryId()"
          class="px-4 py-2 w-60 border border-cyan-200 rounded-full bg-white shadow focus:outline-none focus:border-cyan-500 transition-all"
        />

        <div class="flex items-center gap-2 ml-3">
          <label class="inline-flex items-center gap-1 cursor-pointer font-medium text-cyan-800">
            <input type="radio" name="foodType" value="" [(ngModel)]="selectedType" (change)="getFilteredProductsByCategoryId()" class="accent-cyan-600"/>
            <span class="ml-1">All</span>
          </label>
          <label class="inline-flex items-center gap-1 cursor-pointer font-medium text-green-700">
            <input type="radio" name="foodType" value="false" [(ngModel)]="selectedType" (change)="getFilteredProductsByCategoryId()" class="accent-green-600"/>
            <span class="ml-1">🍃 Veg</span>
          </label>
          <label class="inline-flex items-center gap-1 cursor-pointer font-medium text-red-700">
            <input type="radio" name="foodType" value="true" [(ngModel)]="selectedType" (change)="getFilteredProductsByCategoryId()" class="accent-red-600"/>
            <span class="ml-1">🍗 Non-Veg</span>
          </label>
        </div>

        <span class="ml-auto">
          <app-shortcode (shortcodeEntered)="shortcodeEnteredBySubParent($event)"></app-shortcode>
        </span>
      </div>

      <!-- Product Grid -->
      <div *ngIf="productsByCategoryId && productsByCategoryId.length; else noItems" class="mt-8 px-1 mb-8">
        <div class="grid gap-5 grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5">
          <div *ngFor="let product of productsByCategoryId" class="group">
            <div 
              class="bg-white rounded-xl shadow hover:shadow-xl border border-gray-100 hover:border-cyan-400 transition-all duration-200 p-6 flex flex-col items-center cursor-pointer relative min-h-[160px]"
              (click)="increment(product._id)"
            >
              <!-- Veg/Non-Veg Mark -->
              <span
                *ngIf="product.veg_nonveg === true"
                class="absolute top-2 right-2 flex items-center justify-center" title="Non-Veg"
              >
                <span class="inline-block w-4 h-4 rounded-full border-2 border-red-600 bg-white flex items-center justify-center">
                  <span class="block w-2 h-2 bg-red-600 rounded-full"></span>
                </span>
              </span>
              <span
                *ngIf="product.veg_nonveg === false"
                class="absolute top-2 right-2 flex items-center justify-center" title="Veg"
              >
                <span class="inline-block w-4 h-4 rounded-full border-2 border-green-600 bg-white flex items-center justify-center">
                  <span class="block w-2 h-2 bg-green-600 rounded-full"></span>
                </span>
              </span>
              <div
                class="w-12 h-12 flex items-center justify-center mb-3 rounded-lg bg-cyan-50 group-hover:bg-cyan-100"
              >
                <span class="text-3xl text-cyan-500 font-bold">+</span>
              </div>
              <span class="text-base font-semibold text-cyan-900 group-hover:text-cyan-700 transition text-center">
                {{ product.ProductName }}
              </span>
            </div>
          </div>
        </div>
      </div>
      <ng-template #noItems>
        <div class="flex flex-col items-center mt-16">
          <span class="text-4xl text-cyan-300 mb-2">🍽️</span>
          <span class="text-lg text-cyan-700 font-semibold">No foods found!</span>
        </div>
      </ng-template>
    </div>
