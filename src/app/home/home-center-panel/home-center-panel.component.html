<td class="billing-container align-top p-0">
    <div class="billing-app px-4 py-6 sm:px-6 lg:px-12 max-w-screen-xl mx-auto" style="width:100%;">
      <h2 class="text-xl font-semibold mb-4 text-gray-800">Search Foods</h2>

      <div *ngIf="productsByCategoryId" class="space-y-4">
        <!-- Search Box -->
        <input
          type="text"
          [(ngModel)]="selectedType"
          placeholder="Search food..."
          (keyup)="getFilteredProductsByCategoryId()"
          class="w-full max-w-md px-4 py-2 border border-gray-300 rounded shadow-sm focus:outline-none focus:ring-2 focus:ring-cyan-500"
        />

        <!-- Filters -->
        <div class="flex flex-wrap gap-4 text-sm text-gray-700">
          <label class="inline-flex items-center gap-1">
            <input
              type="radio"
              name="foodType"
              value=""
              [(ngModel)]="selectedType"
              (change)="getFilteredProductsByCategoryId()"
              class="accent-cyan-600"
            />
            All
          </label>
          <label class="inline-flex items-center gap-1">
            <input
              type="radio"
              name="foodType"
              value="false"
              [(ngModel)]="selectedType"
              (change)="getFilteredProductsByCategoryId()"
              class="accent-green-600"
            />
            🍃 Veg
          </label>
          <label class="inline-flex items-center gap-1">
            <input
              type="radio"
              name="foodType"
              value="true"
              [(ngModel)]="selectedType"
              (change)="getFilteredProductsByCategoryId()"
              class="accent-red-600"
            />
            🍗 Non-Veg
          </label>
        </div>
      </div>

      <!-- Product Grid -->
      <div *ngIf="productsByCategoryId" class="mt-8 px-4">
        <div class="grid gap-6 grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5">
          <div *ngFor="let product of productsByCategoryId" class="group h-50">
            <div
              class="bg-white shadow-md hover:shadow-xl border border-gray-200 hover:border-cyan-500 transition-all duration-300 p-5 flex flex-col items-center text-center cursor-pointer relative"
              (click)="increment(product._id)"
            >
              <!-- Veg/Non-Veg Mark -->
              <span
                *ngIf="product.veg_nonveg === true"
                class="absolute top-2 right-2 w-4 h-4 border-2 border-red-600 flex items-center justify-center"
                title="Non-Veg"
                style="border-radius: 0;"
              >
                <span class="w-2 h-2 bg-red-600 block" style="border-radius: 0;"></span>
              </span>
              <span
                *ngIf="product.veg_nonveg === false"
                class="absolute top-2 right-2 w-4 h-4 border-2 border-green-600 flex items-center justify-center"
                title="Veg"
                style="border-radius: 0;"
              >
                <span class="w-2 h-2 bg-green-600 block" style="border-radius: 0;"></span>
              </span>
              <div
                class="w-10 h-10 bg-cyan-100 flex items-center justify-center mb-4 group-hover:bg-cyan-200 transition"
                style="border-radius: 0;"
              >
                <span class="text-3xl text-cyan-600 font-bold">+</span>
              </div>
              <span class="text-base font-semibold text-gray-800 group-hover:text-cyan-700 transition">
                {{ product.ProductName }}
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </td>
