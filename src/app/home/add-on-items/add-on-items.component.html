@if (showPopUp) {
  <div class="comman">
    <button class="close" type="button" (click)="close()">Close</button>
<div class="addon-items-container">
  <!-- Toggle Show/Hide Add-On Items -->
  <!-- <button
    class="mb-3 px-4 py-2 bg-indigo-600 text-white rounded shadow hover:bg-indigo-700 transition"
    (click)="showAddOnItems = !showAddOnItems; "
    type="button"
  >
    {{ showAddOnItems ? 'Hide' : 'Show' }} Add-On Items
  </button> -->
  <!-- <div *ngIf="showAddOnItems">-->
  <div *ngIf="true">
    <!-- Select AddOnProduct -->
     <!-- <div>{{selectedAddOnItems|json}}</div> -->
    <div class="form-group mb-3">
      <label for="addOnProductSelect" class="block mb-1 font-semibold">Select Add-On Product</label>
      <select
        id="addOnProductSelect"
        class="w-full px-3 py-2 border rounded"
        [(ngModel)]="selectedAddOnProduct"
        (change)="onAddOnProductSelect()"
      >
        <option  disabled  value="noID">Select Add-On Product</option>
        <option *ngFor="let product of addOnProducts " [value]="product._id">
          {{ product.name }} - Rs.{{ product.Price }}
        </option>
      </select>
    </div>

    <!-- Selected Add-On Items Box -->
    <div class="selected-addon-items mt-4">
      <div *ngIf="alreadyExists; else notExists">
        <span class="text-red-500">Add-on item already exists.</span>
      </div>
      <ng-template #notExists></ng-template>
      <div *ngIf="selectedAddOnItems && selectedAddOnItems.length > 0">
        <h4 class="font-semibold mb-2">Selected Add-On Items:</h4>
        <div class="flex flex-wrap gap-2">
          <div
            *ngFor="let item of selectedAddOnItems"
            class="addon-item-box flex items-center bg-gray-100 px-3 py-2 rounded shadow"
          >
          <div *ngFor="let product of addOnProducts " >
            <div *ngIf="product._id===item._id">
            {{ product.name }} - Rs.{{ product.Price }} Quantity({{item.numberofQuantity}})
            <!-- <span class="mr-2">{{ product.name }}</span> -->
            <button
              class="ml-2 text-red-600 hover:text-red-800"
              (click)="removeAddOnItem(product._id)"
              title="Remove"
            >
              &times;
            </button>
          
          <button
              class="ml-2 text-red-600 hover:text-red-800"
              (click)="increamentAddOnItem(product._id)"
              title="increment"
            >
              +
            </button>
            <button
            class="ml-2 text-red-600 hover:text-red-800"
            (click)="decrementAddOnItem(product._id)"
            title="decrement"
          >
            -
          </button>
          </div>
        </div>
          </div>
        </div>
      </div>
      <div *ngIf="!selectedAddOnItems || selectedAddOnItems.length === 0" class="text-gray-500">
        No add-on items selected.
      </div>
    </div>
  </div>
</div>
  </div>
}
