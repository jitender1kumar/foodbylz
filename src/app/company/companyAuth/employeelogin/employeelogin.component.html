<div class="login-container mx-auto max-w-md mt-20 bg-white rounded-xl shadow-lg p-8">
  <h2 class="text-2xl font-bold mb-6 text-center">Employee Login</h2>
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <label for="employeeType" class="mb-2 mt-2">Employee Type</label>
    <select
      id="employeeType"
      formControlName="employeeType"
      class="w-full border px-3 py-2 rounded mb-2"
    >
      <option value="">Select Employee Type</option>
      <option value="manager">Manager</option>
      <option value="staff">Staff</option>
      <option value="admin">Admin</option>
    </select>
    <div *ngIf="loginForm.get('employeeType')?.invalid && (loginForm.get('employeeType')?.dirty || loginForm.get('employeeType')?.touched)" class="text-red-500 text-sm mb-2">
      <div *ngIf="loginForm.get('employeeType')?.errors?.['required']">
        Employee type is required.
      </div>
    </div>
    <label for="email" class="mb-2">Email Address</label>
    <input
      id="email"
      type="email"
      formControlName="email"
      placeholder="Enter your work email"
      [class.border-red-500]="loginForm.get('email').invalid && (loginForm.get('email').dirty || loginForm.get('email').touched)"
      class="w-full border px-3 py-2 rounded mb-2"
    />
    <div *ngIf="loginForm.get('email').invalid && (loginForm.get('email').dirty || loginForm.get('email').touched)" class="text-red-500 text-sm mb-2">
      <div *ngIf="loginForm.get('email').errors?.['required']">
        Email is required.
      </div>
      <div *ngIf="loginForm.get('email').errors?.['email']">
        Enter a valid email address.
      </div>
    </div>

    <label for="password" class="mb-2 mt-2">Password</label>
    <input
      id="password"
      type="password"
      formControlName="password"
      placeholder="Enter your password"
      [class.border-red-500]="loginForm.get('password').invalid && (loginForm.get('password').dirty || loginForm.get('password').touched)"
      class="w-full border px-3 py-2 rounded mb-2"
    />
    <div *ngIf="loginForm.get('password').invalid && (loginForm.get('password').dirty || loginForm.get('password').touched)" class="text-red-500 text-sm mb-2">
      <div *ngIf="loginForm.get('password').errors?.['required']">
        Password is required.
      </div>
      <div *ngIf="loginForm.get('password').errors?.['minlength']">
        Password must be at least 6 characters.
      </div>
    </div>

    <button
      type="submit"
      [disabled]="loginForm.invalid"
      class="w-full bg-blue-main py-2 mt-4 rounded text-white font-semibold hover:bg-blue-700 transition"
    >
      Login
    </button>
    <div *ngIf="errorMessage" class="text-center text-red-600 mt-4">
      {{ errorMessage }}
    </div>
  </form>
  <div class="mt-4 text-center">
    <a routerLink="/company/register" class="change-link">Register your company</a>
  </div>
</div>
